syntax = "proto3";

option go_package = "tsunagi/src/rpc";

package rpc;

service Auth {
  rpc GetChallenge  (AuthRequest) returns (AuthChallenge) {}
  rpc ProveChallenge(AuthProof)   returns (AuthToken) {}
}

// AuthRequest is sent by a client who wants to authenticate.
// They will provide their identity and then wait to verify it.
message AuthRequest {
  bytes  PubKey               = 1; // public key
  bytes  HandshakeInitMsg     = 2; // noise IN step 1 handshake msg
}

// AuthChallenge is sent by the server to a connecting client.
// They must solve it and provide a proof.
message AuthChallenge {
  bytes  HandshakeDoneMsg   = 1; // noise IN step 2 handshake msg
  bytes  AuthChallenge      = 2; // encrypted challenge
  // proof of work too??
}

// AuthProof is the solved challenge.
message AuthProof {
  // signature of the nonce
  bytes  Signature   = 1;
}

// AuthToken returns the token to authenticate with the Tsunagi service.
message AuthToken {
  bytes  Token = 1;
}



service Tsunagi {

  // ConnectRelay is for a relay to connect to another relay.
  // This should be used for relay message passing, since a relay never needs to recieve events.
  rpc ConnectRelay(stream RelayEvent) returns (stream RelayAck) {}

  // ConnectClient is for a client to connect with a relay.
  // This should be used when the connecting client wants to also recieve events from the server.
  // If they only plan on pushing events, they should use ConnectRelay instead.
  rpc ConnectClient(stream ClientEvent) returns (stream RelayEvent) {}
}

message Empty {}

message ClientEvent {
  string RelayAddr  = 1;
  oneof Body {
    NoiseHandshake  NoiseHandshake = 2;
    MessagePayload  MessagePayload = 3;
  }
}

message RelayEvent {
  oneof Body {
    NoiseHandshake  NoiseHandshake = 1;
    MessagePayload  MessagePayload = 2;
    RelayAck        RelayAck       = 3;
  }
}

message RelayAck {
  uint64 MessageID   = 1;
}

// noise message to continue handshake with a client
message NoiseHandshake {
  uint64 MessageID        = 1;
  bytes  DeliverToPubKey  = 2;
  bytes  HandshakeMsg     = 3;
}

// encrypted message data for the recieving client
message MessagePayload {
  uint64 MessageID        = 1;
  bytes  DeliverToPubKey  = 2;
  bytes  CipherText       = 3;
}

