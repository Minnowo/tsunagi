syntax = "proto3";

option go_package = "tsunagi/src/rpc";

package rpc;

service Auth {
  rpc GetChallenge  (AuthRequest) returns (AuthChallenge) {}
  rpc ProveChallenge(AuthProof)   returns (AuthToken) {}
}

// AuthRequest is sent by a client who wants to authenticate.
// They will provide their identity and then wait to verify it.
message AuthRequest {
  bytes  DeviceID   = 1; // 32 bytes
  bytes  PubKey     = 2; // public key
}

// AuthChallenge is sent by the server to a connecting client.
// They must solve it and provide a proof.
message AuthChallenge {
  // random string which much be signed by the private key
  bytes  Nonce   = 1;
  // proof of work??
}

// AuthProof is the solved challenge.
message AuthProof {
  // signature of the nonce
  bytes  Signature   = 1;
}

// AuthToken returns the token to authenticate with the Tsunagi service.
message AuthToken {
  bytes  Token = 1;
}



service Tsunagi {

  // ConnectRelay is for a relay to connect to another relay.
  // This should be used for relay message passing, since a relay never needs to recieve events.
  rpc ConnectRelay(stream Event) returns (Empty) {}

  // ConnectClient is for a client to connect with a relay.
  // This should be used when the connecting client wants to also recieve events from the server.
  // If they only plan on pushing events, they should use ConnectRelay instead.
  rpc ConnectClient(stream Event) returns (stream Event) {}
}

message Empty {}

message Event {
  oneof Body {
    ForwardRequest  ForwardRequest = 1;
    DeliverRequest  DeliverRequest = 2;
  }
}

message ForwardRequest {
  bytes  DeviceID   = 1; // 32 bytes
  string RelayAddr  = 2;
  bytes  CipherText = 3;
}

message DeliverRequest {
  bytes  DeviceID   = 1; // 32 bytes
  bytes  CipherText = 2;
}
